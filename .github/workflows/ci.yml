name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Core Protocol Packages ──────────────────────────────────────────────────

  test-crypto:
    name: Test Crypto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test --workspace=packages/crypto

  test-intent-compiler:
    name: Test Intent Compiler
    runs-on: ubuntu-latest
    needs: test-crypto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test --workspace=packages/intent-compiler

  # ── SDKs ─────────────────────────────────────────────────────────────────────

  test-sdk-js:
    name: Test JS SDK
    runs-on: ubuntu-latest
    needs: [test-crypto, test-intent-compiler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test --workspace=packages/sdk-js

  test-sdk-python:
    name: Test Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -e "packages/sdk-python[dev]"
      - run: pytest packages/sdk-python/tests -v

  # ── Platform Wrappers ─────────────────────────────────────────────────────────

  test-aap-claude:
    name: Test AAP-Claude Wrapper
    runs-on: ubuntu-latest
    needs: test-sdk-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test --workspace=packages/aap-claude

  test-aap-openai:
    name: Test AAP-OpenAI Wrapper
    runs-on: ubuntu-latest
    needs: test-sdk-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test --workspace=packages/aap-openai

  test-aap-gemini:
    name: Test AAP-Gemini Wrapper
    runs-on: ubuntu-latest
    needs: test-sdk-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test --workspace=packages/aap-gemini

  # ── Services ─────────────────────────────────────────────────────────────────

  test-demo-agents:
    name: Test Demo Agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test --workspace=packages/demo-agents

  test-human-auth:
    name: Test Human Auth Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test --workspace=packages/human-auth

  test-mailbox:
    name: Test Mailbox Server
    runs-on: ubuntu-latest
    needs: test-crypto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test --workspace=packages/mailbox-server

  test-audit:
    name: Test Audit Server
    runs-on: ubuntu-latest
    needs: test-crypto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test --workspace=packages/audit-server

  test-identity:
    name: Test Identity Service
    runs-on: ubuntu-latest
    needs: test-crypto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test --workspace=packages/identity-service

  # ── All green gate ────────────────────────────────────────────────────────────

  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs:
      - test-crypto
      - test-intent-compiler
      - test-sdk-js
      - test-sdk-python
      - test-aap-claude
      - test-aap-openai
      - test-aap-gemini
      - test-demo-agents
      - test-human-auth
      - test-mailbox
      - test-audit
      - test-identity
    steps:
      - run: echo "✅ All AAP test suites passed"
