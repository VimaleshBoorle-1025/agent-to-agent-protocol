name: Deploy Synapse

on:
  push:
    branches: [master, main]
    paths:
      - 'packages/synapse/**'
      - '.github/workflows/synapse-deploy.yml'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/synapse

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/synapse/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_REGISTRY_URL: ${{ secrets.VITE_REGISTRY_URL }}

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_SYNAPSE }}
          working-directory: packages/synapse
          vercel-args:       '--prod'
