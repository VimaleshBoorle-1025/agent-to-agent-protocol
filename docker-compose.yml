version: '3.9'

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: aap-postgres
    environment:
      POSTGRES_DB: aap
      POSTGRES_USER: aap
      POSTGRES_PASSWORD: aap_dev_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aap"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aap-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── AAP Services ─────────────────────────────────────────────────────────────

  registry:
    build:
      context: .
      dockerfile: packages/registry-server/Dockerfile
    container_name: aap-registry
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://aap:aap_dev_secret@postgres:5432/aap
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailbox:
    build:
      context: .
      dockerfile: packages/mailbox-server/Dockerfile
    container_name: aap-mailbox
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgres://aap:aap_dev_secret@postgres:5432/aap
      REDIS_URL: redis://redis:6379
      REGISTRY_URL: http://registry:3001
      NODE_ENV: development
    depends_on:
      registry:
        condition: service_healthy

  audit:
    build:
      context: .
      dockerfile: packages/audit-server/Dockerfile
    container_name: aap-audit
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgres://aap:aap_dev_secret@postgres:5432/aap
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  identity:
    build:
      context: .
      dockerfile: packages/identity-service/Dockerfile
    container_name: aap-identity
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgres://aap:aap_dev_secret@postgres:5432/aap
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  human-auth:
    build:
      context: .
      dockerfile: packages/human-auth/Dockerfile
    container_name: aap-human-auth
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgres://aap:aap_dev_secret@postgres:5432/aap
      REDIS_URL: redis://redis:6379
      REGISTRY_URL: http://registry:3001
      NODE_ENV: development
    depends_on:
      redis:
        condition: service_healthy

  # ── Demo Agents ───────────────────────────────────────────────────────────────

  demo-echo:
    build:
      context: .
      dockerfile: packages/demo-agents/Dockerfile
    container_name: aap-demo-echo
    ports:
      - "9001:9001"
    environment:
      AGENT_NAME: demo.echo.agent
      AGENT_PORT: 9001
      REGISTRY_URL: http://registry:3001
      NODE_ENV: development
    depends_on:
      registry:
        condition: service_healthy

  demo-weather:
    build:
      context: .
      dockerfile: packages/demo-agents/Dockerfile
    container_name: aap-demo-weather
    ports:
      - "9002:9002"
    environment:
      AGENT_NAME: demo.weather.agent
      AGENT_PORT: 9002
      REGISTRY_URL: http://registry:3001
      NODE_ENV: development
    depends_on:
      registry:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
